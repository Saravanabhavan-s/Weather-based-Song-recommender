version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: vibecast-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - vibecast_mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: vibecast-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: vibecast-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  vibecast_mongo_data:
